<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Seekho 2026 Certificate of Achievement</title>
  <desc id="desc">Certificate summary for Syed Muhammad Saad, Regional Shortlist, AI Seekho 2026 Google Antigravity National Hackathon.</desc>
  <defs>
