<svg xmlns="http://www.w3.org/2000/svg" width="760" height="880" viewBox="0 0 760 880" role="img" aria-label="Syed Saad, founder of Omnia Sec AI Labs">
  <defs>
    <linearGradient id="fade" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#070b14" stop-opacity="0"/><stop offset="1" stop-color="#070b14" stop-opacity=".88"/></linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#67e8f9" stop-opacity=".35"/>
      <stop offset=".55" stop-color="#6687ff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ff9f43" stop-opacity=".22"/>
    </linearGradient>
    <clipPath id="portraitClip"><rect x="0" y="0" width="760" height="880" rx="46" ry="46"/></clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="42" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="760" height="880" rx="46" fill="#070b14"/>
  <g clip-path="url(#portraitClip)" filter="url(#softShadow)">
    <image href="data:image/jpeg;base64," x="0" y="0" width="760" height="880" preserveAspectRatio="xMidYMid slice"/>
    <rect width="760" height="880" fill="url(#edge)" opacity=".18"/>
    <rect y="670" width="760" height="210" fill="url(#fade)"/>
  </g>
  <rect x="1.5" y="1.5" width="757" height="877" rx="44" fill="none" stroke="url(#edge)" stroke-width="3" opacity=".55"/>
</svg>